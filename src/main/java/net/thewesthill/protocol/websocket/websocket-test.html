<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Netty · WS Probe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0E14;
  --surface:#11161F;
  --surface-2:#161B22;
  --border:#1F2630;
  --text:#E6EDF3;
  --text-muted:#7D8590;
  --text-dim:#4B5563;
  --tx:#FFA657;
  --rx:#56D4DD;
  --err:#FF6B6B;
  --ok:#56D4DD;
  --focus:rgba(86,212,221,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"IBM Plex Mono","SFMono-Regular",Menlo,Consolas,monospace;
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  max-width:1280px;
  margin:0 auto;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
}

/* Header */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.brand .sep{color:var(--text-dim)}
.status{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--text-muted);
}
.status .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text-dim);
}
.status.connecting .dot{background:var(--tx);animation:pulse 1.2s ease-in-out infinite}
.status.connecting{color:var(--tx)}
.status.connected .dot{background:var(--ok);box-shadow:0 0 8px rgba(86,212,221,.6)}
.status.connected{color:var(--ok)}
.status.error .dot{background:var(--err)}
.status.error{color:var(--err)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* Controls */
.controls{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.field{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.field .label{
  font-size:10px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--text-muted);
  user-select:none;
}
.field input{
  flex:1;
  min-width:0;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border);
  color:var(--text);
  font-family:inherit;
  font-size:13px;
  padding:6px 2px;
  outline:none;
  transition:border-color .15s;
}
.field input:focus{border-bottom-color:var(--rx);box-shadow:0 1px 0 0 var(--rx)}
.field input:disabled{color:var(--text-dim);cursor:not-allowed}

.btn{
  font-family:inherit;
  font-size:11px;
  font-weight:500;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:7px 14px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  cursor:pointer;
  transition:all .15s;
  border-radius:0;
}
.btn:hover:not(:disabled){border-color:var(--text-muted);background:var(--surface-2)}
.btn:focus-visible{outline:2px solid var(--rx);outline-offset:2px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{border-color:var(--rx);color:var(--rx)}
.btn-primary:hover:not(:disabled){background:rgba(86,212,221,.08)}
.btn-danger{border-color:var(--err);color:var(--err)}
.btn-danger:hover:not(:disabled){background:rgba(255,107,107,.08)}
.btn-tx{border-color:var(--tx);color:var(--tx)}
.btn-tx:hover:not(:disabled){background:rgba(255,166,87,.08)}

/* Composer */
.composer{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.composer .prompt{color:var(--tx);font-weight:500}
.composer input{
  flex:1;
  min-width:0;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  font-family:inherit;
  font-size:13px;
  padding:8px 12px;
  outline:none;
  border-radius:0;
}
.composer input:focus{border-color:var(--rx);box-shadow:0 0 0 2px var(--focus)}
.composer input:disabled{opacity:.4;cursor:not-allowed}
.composer .actions{display:flex;gap:8px}

/* Log */
.log{
  flex:1;
  overflow-y:auto;
  padding:8px 0;
  background:var(--bg);
  font-size:12.5px;
  line-height:1.6;
}
.log::-webkit-scrollbar{width:10px}
.log::-webkit-scrollbar-track{background:var(--bg)}
.log::-webkit-scrollbar-thumb{background:var(--border);border:2px solid var(--bg)}
.log::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

.frame{
  display:grid;
  grid-template-columns:104px 22px 1fr;
  padding:3px 20px;
  border-left:2px solid transparent;
  transition:background .1s;
}
.frame:hover{background:var(--surface)}
.frame .ts{color:var(--text-dim);font-variant-numeric:tabular-nums}
.frame .dir{font-weight:600;text-align:center}
.frame.out{border-left-color:var(--tx)}
.frame.out .dir{color:var(--tx)}
.frame.in{border-left-color:var(--rx)}
.frame.in .dir{color:var(--rx)}
.frame.err{border-left-color:var(--err)}
.frame.err .dir{color:var(--err)}
.frame.info{border-left-color:var(--text-dim)}
.frame.info .dir{color:var(--text-dim)}
.frame .payload{color:var(--text);word-break:break-word;white-space:pre-wrap}
.frame.info .payload{color:var(--text-muted)}
.frame.err .payload{color:var(--err)}

.log-empty{
  padding:48px 20px;
  text-align:center;
  color:var(--text-dim);
  font-size:12px;
  letter-spacing:.04em;
}

/* Footer */
.footer{
  padding:8px 20px;
  border-top:1px solid var(--border);
  background:var(--surface);
  font-size:10px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--text-dim);
  display:flex;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}
.footer code{color:var(--text-muted);text-transform:none;letter-spacing:0}
.footer kbd{
  font-family:inherit;
  background:var(--bg);
  border:1px solid var(--border);
  padding:1px 5px;
  color:var(--text-muted);
}

@media (max-width:680px){
  .controls,.composer{flex-wrap:wrap}
  .composer .actions{width:100%}
  .frame{grid-template-columns:84px 18px 1fr;padding:3px 12px}
  .header,.controls,.composer,.footer{padding-left:12px;padding-right:12px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <span>NETTY</span>
      <span class="sep">·</span>
      <span>WS PROBE</span>
    </div>
    <div class="status" id="status">
      <span class="dot"></span>
      <span class="text">LINK DOWN</span>
    </div>
  </header>

  <section class="controls">
    <div class="field">
      <span class="label">URL</span>
      <input type="text" id="url" value="ws://localhost:8080/websocket" spellcheck="false" autocomplete="off">
    </div>
    <button class="btn btn-primary" id="btnConnect">Connect</button>
    <button class="btn btn-danger" id="btnDisconnect" disabled>Disconnect</button>
  </section>

  <section class="composer">
    <span class="prompt">&rsaquo;</span>
    <input type="text" id="message" placeholder="text frame payload…" spellcheck="false" autocomplete="off" disabled>
    <div class="actions">
      <button class="btn btn-tx" id="btnSend" disabled>Send</button>
      <button class="btn" id="btnClear">Clear</button>
    </div>
  </section>

  <main class="log" id="log">
    <div class="log-empty">no frames yet &middot; connect to start</div>
  </main>

  <footer class="footer">
    <span>server echoes text &middot; appends <code>, Welcome Netty Websocket Server, Now: &lt;date&gt;</code></span>
    <span><kbd>Enter</kbd> send</span>
  </footer>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const urlEl = $("url"), msgEl = $("message");
  const btnC = $("btnConnect"), btnD = $("btnDisconnect"), btnS = $("btnSend"), btnX = $("btnClear");
  const statusEl = $("status"), logEl = $("log");

  let ws = null;

  const pad = (n,l=2) => String(n).padStart(l,"0");
  const ts = () => {
    const d = new Date();
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad(d.getMilliseconds(),3)}`;
  };

  function append(type, dir, text){
    const empty = logEl.querySelector(".log-empty");
    if(empty) empty.remove();
    const row = document.createElement("div");
    row.className = `frame ${type}`;
    const t = document.createElement("span"); t.className="ts"; t.textContent = ts();
    const a = document.createElement("span"); a.className="dir"; a.textContent = dir;
    const p = document.createElement("span"); p.className="payload"; p.textContent = text;
    row.appendChild(t); row.appendChild(a); row.appendChild(p);
    logEl.appendChild(row);
    const nearBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 80;
    if(nearBottom) logEl.scrollTop = logEl.scrollHeight;
  }

  function setStatus(state, text){
    statusEl.className = "status" + (state ? " " + state : "");
    statusEl.querySelector(".text").textContent = text;
  }

  function setConnected(connected){
    btnC.disabled = connected;
    btnD.disabled = !connected;
    btnS.disabled = !connected;
    msgEl.disabled = !connected;
    urlEl.disabled = connected;
    if(connected) msgEl.focus(); else urlEl.focus();
  }

  function connect(){
    const url = urlEl.value.trim();
    if(!url){ append("err","✕","url is empty"); return; }
    append("info","•",`opening ${url}`);
    setStatus("connecting","LINKING");
    try{
      ws = new WebSocket(url);
    }catch(e){
      append("err","✕",`construct failed: ${e.message}`);
      setStatus("error","LINK ERROR");
      return;
    }
    ws.onopen = () => {
      append("info","•","handshake complete · connection open");
      setStatus("connected","LINK UP");
      setConnected(true);
    };
    ws.onmessage = ev => append("in","←",ev.data);
    ws.onerror = () => append("err","✕","socket error · is WebSocketServer running on :8080?");
    ws.onclose = ev => {
      const reason = ev.reason ? ` · ${ev.reason}` : "";
      append("info","•",`closed · code=${ev.code}${reason}`);
      setStatus("","LINK DOWN");
      setConnected(false);
      ws = null;
    };
  }

  function disconnect(){
    if(ws){ append("info","•","closing by client"); ws.close(1000); }
  }

  function send(){
    if(!ws || ws.readyState !== WebSocket.OPEN){
      append("err","✕","not open · cannot send");
      return;
    }
    const text = msgEl.value;
    if(!text) return;
    ws.send(text);
    append("out","→",text);
    msgEl.value = "";
    msgEl.focus();
  }

  function clearLog(){
    logEl.innerHTML = "";
    const e = document.createElement("div");
    e.className = "log-empty";
    e.textContent = "no frames yet · connect to start";
    logEl.appendChild(e);
  }

  btnC.addEventListener("click", connect);
  btnD.addEventListener("click", disconnect);
  btnS.addEventListener("click", send);
  btnX.addEventListener("click", clearLog);
  msgEl.addEventListener("keydown", e => { if(e.key === "Enter") send(); });
  urlEl.addEventListener("keydown", e => { if(e.key === "Enter" && (!ws || ws.readyState !== WebSocket.OPEN)) connect(); });
  window.addEventListener("beforeunload", () => { if(ws) ws.close(); });
})();
</script>
</body>
</html>
